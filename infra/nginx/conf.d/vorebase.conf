# =============================================
# Vorebase — Nginx Reverse Proxy Configuration
# =============================================
# Routes all traffic through a single entry point (:80)
# to the appropriate backend service.
#
# Services run on the HOST machine (not in Docker),
# so we use host.docker.internal to reach them.
# =============================================

upstream auth_service {
    server host.docker.internal:4001;
}

upstream rest_service {
    server host.docker.internal:4002;
}

upstream storage_service {
    server host.docker.internal:4003;
}

upstream ws_service {
    server host.docker.internal:4004;
}

upstream studio {
    server host.docker.internal:3000;
}

server {
    listen 80;
    server_name _;

    # --- Auth Service ---
    location /auth/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- REST API Service ---
    location /rest/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://rest_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Request body size limit (for INSERT/UPDATE payloads)
        client_max_body_size 1m;
    }

    # --- Storage Service ---
    location /storage/ {
        proxy_pass http://storage_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (50MB)
        client_max_body_size 50m;
    }

    # --- Realtime WebSocket ---
    location /realtime/ {
        proxy_pass http://ws_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep connections alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Dashboard / Studio (catch-all) ---
    location / {
        proxy_pass http://studio;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
